name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deploy must never be interrupted. cancel-in-progress=false prevents a newer
# push from killing an in-flight prod deploy mid-step (which could leave
# wrangler in a half-deployed state where secrets are out-of-sync with code).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Restrictive default. Jobs that need more declare their own permissions block.
permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  # ============================================
  # VALIDATION - Must pass before any deployment
  # ============================================
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_CF_BEACON_TOKEN: ${{ secrets.NEXT_PUBLIC_CF_BEACON_TOKEN }}

      - name: Build OpenNext for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_CF_BEACON_TOKEN: ${{ secrets.NEXT_PUBLIC_CF_BEACON_TOKEN }}

      - name: Verify build output
        run: |
          echo "Checking .open-next directory..."
          ls -la .open-next/
          echo "Checking worker.js..."
          ls -la .open-next/worker.js
          echo "Checking assets..."
          ls -la .open-next/assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: opennext-build
          path: .open-next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  # ============================================
  # PREVIEW DEPLOYMENT - For Pull Requests
  # ============================================
  deploy-preview:
    name: Deploy Preview
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: opennext-build
          path: .open-next/

      - name: Deploy Preview to Cloudflare
        id: deploy
        run: npx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment Preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const sha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);

            const body = `### 🚀 Preview Deployment Ready!

            | Status | Details |
            |--------|---------|
            | **URL** | ${url} |
            | **Commit** | \`${sha}\` |
            | **Branch** | \`${{ github.head_ref }}\` |`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ============================================
  # PRODUCTION DEPLOYMENT - For main branch
  # ============================================
  deploy-production:
    name: Deploy Production
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
      issues: write
    environment:
      name: production
      url: https://alexmayhew.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: opennext-build
          path: .open-next/

      - name: Verify artifacts
        run: |
          echo "Verifying downloaded artifacts..."
          ls -la .open-next/
          ls -la .open-next/worker.js || echo "worker.js not found"

      - name: Validate required secrets are non-empty
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LISTMONK_API_URL: ${{ secrets.LISTMONK_API_URL }}
          LISTMONK_API_USER: ${{ secrets.LISTMONK_API_USER }}
          LISTMONK_API_KEY: ${{ secrets.LISTMONK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          # Hard-required — deploy itself fails without these
          [[ -n "$CLOUDFLARE_API_TOKEN" ]]  || { echo "::error::CLOUDFLARE_API_TOKEN empty"; exit 1; }
          [[ -n "$CLOUDFLARE_ACCOUNT_ID" ]] || { echo "::error::CLOUDFLARE_ACCOUNT_ID empty"; exit 1; }
          # Hard-required — runtime features will silently fail without these
          [[ -n "$LISTMONK_API_URL" ]]   || { echo "::error::LISTMONK_API_URL empty"; exit 1; }
          [[ -n "$LISTMONK_API_USER" ]]  || { echo "::error::LISTMONK_API_USER empty"; exit 1; }
          [[ -n "$LISTMONK_API_KEY" ]]   || { echo "::error::LISTMONK_API_KEY empty"; exit 1; }
          [[ -n "$RESEND_API_KEY" ]]     || { echo "::error::RESEND_API_KEY empty"; exit 1; }
          [[ -n "$CONTACT_EMAIL" ]]      || { echo "::error::CONTACT_EMAIL empty"; exit 1; }
          # Soft-required — post-deploy steps that degrade gracefully; warn only
          [[ -n "$INDEXNOW_KEY" ]]              || echo "::warning::INDEXNOW_KEY empty — IndexNow submission will be skipped"
          [[ -n "$GSC_SERVICE_ACCOUNT_JSON" ]]  || echo "::warning::GSC_SERVICE_ACCOUNT_JSON empty — sitemap submission will be skipped"
          echo "All required secrets are present."

      - name: Deploy to Cloudflare Workers
        id: deploy
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Push secrets AFTER deploy. `wrangler secret put` requires that the
      # latest uploaded version equals the currently-deployed version; doing
      # this pre-deploy breaks rollback recovery, because `wrangler rollback`
      # makes an older version the deployed one while a newer (bad) version
      # remains as "latest" — any subsequent secret push fails until a fresh
      # deploy re-aligns the two. The small race window on first request is
      # acceptable — secrets propagate within ~1s.
      - name: Set Worker secrets (post-deploy)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LISTMONK_API_URL: ${{ secrets.LISTMONK_API_URL }}
          LISTMONK_API_USER: ${{ secrets.LISTMONK_API_USER }}
          LISTMONK_API_KEY: ${{ secrets.LISTMONK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: |
          printf '%s' "$LISTMONK_API_URL"  | npx wrangler secret put LISTMONK_API_URL
          printf '%s' "$LISTMONK_API_USER" | npx wrangler secret put LISTMONK_API_USER
          printf '%s' "$LISTMONK_API_KEY"  | npx wrangler secret put LISTMONK_API_KEY
          printf '%s' "$RESEND_API_KEY"    | npx wrangler secret put RESEND_API_KEY
          printf '%s' "$CONTACT_EMAIL"     | npx wrangler secret put CONTACT_EMAIL

      - name: Health Check with SHA Verification
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          expected_short="${EXPECTED_SHA:0:7}"
          echo "Waiting for deployment of SHA $expected_short..."

          for i in $(seq 1 12); do
            response=$(curl -sf https://alexmayhew.dev/api/health || echo '{"status":"error"}')
            status=$(echo "$response" | jq -r '.status // "error"')
            deployment_sha=$(echo "$response" | jq -r '.deployment.sha // "unknown"')

            echo "Attempt $i/12: status=$status sha=$deployment_sha (expected=$expected_short)"

            if [ "$status" = "ok" ] && [ "$deployment_sha" = "$expected_short" ]; then
              echo "Health check passed! Deployed SHA matches."
              exit 0
            fi

            sleep 5
          done

          echo "::error::Health check failed after 60s. Last status=$status, sha=$deployment_sha, expected=$expected_short"
          exit 1

      - name: Smoke Tests
        run: |
          echo "Running smoke tests..."

          # Test critical pages
          for page in "/" "/services" "/for" "/contact" "/work"; do
            echo "Testing https://alexmayhew.dev$page"
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://alexmayhew.dev$page")
            if [ "$status" != "200" ]; then
              echo "FAILED: $page returned $status"
              exit 1
            fi
            echo "OK: $page"
          done

          echo "All smoke tests passed!"

      - name: Sitemap URL Validation
        run: |
          echo "Fetching sitemap..."
          SITEMAP_URLS=$(curl -s https://alexmayhew.dev/sitemap.xml | grep -oP '(?<=<loc>)[^<]+')
          TOTAL=$(echo "$SITEMAP_URLS" | wc -l)
          FAILED=0
          echo "Checking $TOTAL URLs from sitemap..."
          while IFS= read -r url; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: $url -> $STATUS"
              FAILED=$((FAILED + 1))
            fi
          done <<< "$SITEMAP_URLS"
          echo "Results: $((TOTAL - FAILED))/$TOTAL passed"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED sitemap URLs returned non-200 status"
            exit 1
          fi

      - name: Submit to IndexNow
        if: success()
        run: |
          echo "Fetching sitemap URLs..."
          URLS=$(curl -s https://alexmayhew.dev/sitemap.xml | grep -oP '(?<=<loc>)[^<]+')
          TOTAL=$(echo "$URLS" | wc -l)
          echo "Submitting $TOTAL URLs to IndexNow..."

          # Build JSON payload
          URL_JSON=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"alexmayhew.dev\",
              \"key\": \"${{ secrets.INDEXNOW_KEY }}\",
              \"keyLocation\": \"https://alexmayhew.dev/${{ secrets.INDEXNOW_KEY }}.txt\",
              \"urlList\": $URL_JSON
            }")

          echo "IndexNow response: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
            echo "IndexNow submission successful ($TOTAL URLs)"
          else
            echo "::warning::IndexNow returned $RESPONSE (non-fatal)"
          fi

      - name: Submit sitemap to Google Search Console
        if: success()
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: node scripts/submit-sitemap-gsc.mjs

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production Deployment Failed - ${sha}`,
              body: `## Deployment Failure Alert\n\n**Commit:** \`${sha}\`\n**Actor:** @${{ github.actor }}\n**Run:** [View Logs](${runUrl})\n\n### Next Steps\n1. Check the workflow logs\n2. If critical, rollback via Cloudflare Dashboard\n3. Fix the issue and push a new commit`,
              labels: ['deployment', 'bug']
            });

name: Mutation Testing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

concurrency:
  group: mutation-testing
  cancel-in-progress: true

# Mutation testing reads code and uploads an artifact — read-only scope.
permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  mutation:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    # Mutation testing is slow by design (every mutant is a test run). 60m
    # is a ceiling, not a target — if a run approaches this, investigate.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run mutation testing
        run: npm run test:mutation
        continue-on-error: true

      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30
